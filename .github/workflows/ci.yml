name: CI
on: [push, pull_request]
jobs:
  scan-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Secret scan (gitleaks CLI)
        run: |
          set -e
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz | tar xz gitleaks
          ./gitleaks git --no-banner --redact --exit-code 1 .
          echo "Secret scan clean."
      - name: Brand-asset scan
        run: |
          set -e
          PATTERNS='Darwin_v3|primate-intelligence-logo|primate-vision-logo|logo-dark\.svg'
          if git grep -IlE "$PATTERNS" -- . ':!/.github/workflows/ci.yml'; then
            echo "::error::Brand asset reference found — Primate brand assets must not enter public repos."
            exit 1
          fi
          if find . -path ./node_modules -prune -o -type f \( -name '*Darwin*' -o -name '*primate*logo*' \) -print | grep -q .; then
            echo "::error::Brand asset file found."
            exit 1
          fi
          echo "Brand scan clean."
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run build
      - run: npm test
